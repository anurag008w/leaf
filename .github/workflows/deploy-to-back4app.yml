name: Deploy to Back4App Containers

# Auto-deploys to Back4App on every push to main.
# Requires repository secret:
#   BACK4APP_ACCOUNT_KEY — Back4App API key (cloud.back4app.com → Account → Keys)

on:
  push:
    branches: [main]
  workflow_dispatch: {}

jobs:
  deploy-to-back4app:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Deploy to Back4App Containers
        uses: back4app/deploy-action@v1
        with:
          accountKey: ${{ secrets.BACK4APP_ACCOUNT_KEY }}
          appName: zone-study-os
