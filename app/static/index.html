  <style>
    @keyframes fadeInUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    .toast { padding: 12px 20px; border-radius: 10px; background: var(--bg-2); border: 1px solid var(--line); box-shadow: var(--shadow-1); animation: fadeInUp 0.3s ease; font-size: 13px; pointer-events: auto; display: flex; align-items: center; gap: 10px; max-width: 380px; font-family: 'Space Grotesk', sans-serif; }
    .toast.success { border-color: var(--accent-solve); }
    .toast.warning { border-color: var(--accent-break); color: var(--accent-break); }
    .toast.error { border-color: var(--danger); color: var(--danger); }
    .confetti-piece { position: fixed; width: 8px; height: 8px; border-radius: 2px; animation: confetti-fall 3s ease-out forwards; z-index: 999; pointer-events: none; }
    @keyframes confetti-fall { 0% { transform: translateY(-10px) rotate(0deg); opacity: 1; } 100% { transform: translateY(100vh) rotate(720deg); opacity: 0; } }
    @media (max-width: 600px) {
      .hdr-right .icon-btn { padding: 8px 10px; font-size: 10px; letter-spacing: 0; }
      .hdr-clock { font-size: 10px; }
      .hdr-clock b { font-size: 15px; }
    }
    @media (prefers-reduced-motion: reduce) { * { animation-duration: 0.001ms !important; transition-duration: 0.001ms !important; } }
  </style>
</head>
